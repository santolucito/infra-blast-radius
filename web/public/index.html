<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Security Blast Radius — live</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="brand">Security Blast Radius <span>· live</span></div>
    <div id="tabs" class="tabs"></div>
  </header>
  <main>
    <section class="left">
      <div class="story" id="story"></div>
      <div class="fixbar" id="fixbar"></div>
      <div class="graphwrap">
        <svg id="graph" viewBox="0 0 1000 620" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
    </section>
    <aside class="right" id="panel"></aside>
  </main>
  <div id="status" class="status"></div>
  <script src="app.js"></script>
</body>
</html>
